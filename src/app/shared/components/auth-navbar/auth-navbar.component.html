<nav class="auth-navbar">
  <div class="navbar-container">
    <!-- Logo -->
    <a routerLink="/health" class="navbar-logo">
      <div class="navbar-logo-icon">
        <i class="fa-solid fa-heart-pulse"></i>
      </div>
      <span>HealthAI</span>
    </a>

    <!-- Desktop Menu -->
    <div class="navbar-menu">
      <a routerLink="/health" class="navbar-link">Home</a>
      <a routerLink="/login" class="navbar-link">Sign In</a>
      <a routerLink="/register" class="navbar-link navbar-link-primary">Get Started</a>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="navbar-toggle" (click)="toggleMobileMenu()" [attr.aria-expanded]="isMobileMenuOpen()">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  @if (isMobileMenuOpen()) {
    <div class="navbar-mobile-menu">
      <a routerLink="/health" class="navbar-mobile-link" (click)="closeMobileMenu()">Home</a>
      <a routerLink="/login" class="navbar-mobile-link" (click)="closeMobileMenu()">Sign In</a>
      <a routerLink="/register" class="navbar-mobile-link navbar-mobile-link-primary" (click)="closeMobileMenu()">Get Started</a>
    </div>
  }
</nav>
